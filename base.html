
<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Administración Biblioteca</title>
    <style>
        body { font-family: Arial; margin: 40px; background-color: #f4f4f4; }
        nav a { margin-right: 15px; text-decoration: none; font-weight: bold; }
        table { border-collapse: collapse; width: 100%; margin-top: 20px; }
        th, td { border: 1px solid #ccc; padding: 8px; text-align: left; }
        th { background-color: #ddd; }
        form { margin-top: 20px; }
        input, select { padding: 5px; margin: 5px 0; }
        button { padding: 6px 12px; }
    </style>
</head>
<body>
    <h1>Sistema de Administración de Biblioteca</h1>
    <nav>
        <a href="/">Inicio</a>
        <a href="/libros">Libros</a>
        <a href="/usuarios">Usuarios</a>
        <a href="/prestamos">Préstamos</a>
    </nav>
    <hr>
    {% block content %}{% endblock %}
</body>
</html>

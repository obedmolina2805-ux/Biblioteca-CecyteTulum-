
{% extends 'base.html' %}
{% block content %}
<h2>Libros</h2>
<table>
    <tr>
        <th>ID</th>
        <th>Título</th>
        <th>Autor</th>
        <th>Año</th>
    </tr>
    {% for libro in libros %}
    <tr>
        <td>{{ libro.id }}</td>
        <td>{{ libro.titulo }}</td>
        <td>{{ libro.autor }}</td>
        <td>{{ libro.anio }}</td>
    </tr>
    {% endfor %}
</table>

<h3>Agregar Libro</h3>
<form method="POST" action="/agregar_libro">
    <input type="text" name="titulo" placeholder="Título" required><br>
    <input type="text" name="autor" placeholder="Autor" required><br>
    <input type="number" name="anio" placeholder="Año" required><br>
    <button type="submit">Agregar</button>
</form>
{% endblock %}
